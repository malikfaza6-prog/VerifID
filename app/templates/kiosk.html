<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Absensi - VerifID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
            margin: 0;
            background: radial-gradient(ellipse at center, #1e293b 0%, #0f172a 100%);
        }

        .kiosk-wrapper {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .kiosk-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .kiosk-brand {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
        }

        .kiosk-sub {
            color: #94a3b8;
            font-weight: 500;
        }

        .kiosk-clock {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
            margin-top: 10px;
        }

        .card-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
        }

        .card-panel__title {
            color: white;
        }

        .attendance-result {
            color: #1e293b;
        }
    </style>
</head>

<body>

    <div class="kiosk-wrapper">
        <div class="kiosk-header">
            <div class="kiosk-brand"><i class="bi bi-person-bounding-box text-primary me-2"></i>VerifID</div>
            <div class="kiosk-sub">
                Silakan hadapkan wajah Anda ke kamera untuk melakukan absen
                {% if current_kelas %}<span class="badge bg-primary ms-2">{{ current_kelas }}</span>{% endif %}
            </div>
            <div class="kiosk-clock" id="liveTime">-</div>
        </div>

        <!-- Row Utama penampung Kamera dan Hasil Scan -->
        <div class="row g-4 justify-content-center">

            <!-- Camera Panel (Kiri) -->
            <div class="col-lg-7">
                <div class="card-panel h-100 d-flex flex-column">
                    <div class="card-panel__header">
                        <h5 class="card-panel__title mb-0">
                            <i class="bi bi-camera-fill me-2 text-success"></i> Kamera Scanner
                        </h5>
                        <span class="badge bg-success"><i class="bi bi-record-circle-fill me-1"></i>LIVE</span>
                    </div>

                    <div class="card-panel__body p-3 flex-grow-1 d-flex flex-column justify-content-between">
                        <!-- Dropdown Pilihan Mata Kuliah -->
                        <div class="mb-3 text-start">
                            <label for="matkulSelect" class="form-label fw-bold text-light-50">Pilih Mata
                                Kuliah:</label>
                            <select class="form-select" id="matkulSelect">
                                <option value="" selected disabled>-- Pilih Mata Kuliah Terlebih Dahulu --</option>
                                {% for matkul in matkul_list %}
                                <option value="{{ matkul.id }}">{{ matkul.nama_matkul }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Kamera -->
                        <div class="camera-container attendance-camera mx-auto"
                            style="border: 2px solid rgba(255,255,255,0.2);">
                            <video id="videoFeed" class="camera-video" autoplay muted playsinline></video>
                            <canvas id="faceCanvas" class="camera-overlay"></canvas>

                            <div class="scan-overlay" id="scanGraphic">
                                <div class="scan-frame">
                                    <div class="scan-corner tl"></div>
                                    <div class="scan-corner tr"></div>
                                    <div class="scan-corner bl"></div>
                                    <div class="scan-corner br"></div>
                                    <div class="scan-line" id="scanLine"></div>
                                </div>
                            </div>

                            <div class="camera-status-bar" id="cameraStatusBar">
                                <span id="statusText">Mendeteksi wajah...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Result Panel (Kanan) -->
            <div class="col-lg-5">
                <div class="card-panel h-100">
                    <div class="card-panel__header">
                        <h5 class="card-panel__title mb-0">
                            <i class="bi bi-person-check-fill me-2 text-info"></i> Hasil Scan
                        </h5>
                        <button onclick="keluarKeLogin()" class="btn btn-sm btn-outline-light">
                            <i class="bi bi-arrow-left me-1"></i> Kembali
                        </button>
                    </div>
                    <div class="card-panel__body" id="resultPanel">

                        <!-- Idle State -->
                        <div class="text-center py-5 text-white-50" id="emptyResult">
                            <i class="bi bi-qr-code-scan d-block mb-3" style="font-size: 60px; opacity: 0.5;"></i>
                            <h5>Menunggu Absensi</h5>
                            <p class="small">Scan wajah Anda pada frame hijau.</p>
                        </div>

                        <!-- Matkul Selection State -->
                        <div id="matkulResult" class="d-none">
                            <div class="attendance-result text-center">
                                <div class="result-employee justify-content-center">
                                    <div class="result-avatar" id="matkulAvatar">
                                        <i class="bi bi-person-fill"></i>
                                    </div>
                                    <div class="result-info text-start">
                                        <h5 id="matkulNama" class="text-white">-</h5>
                                        <div class="result-meta">
                                            <span><i class="bi bi-card-text me-1"></i><span id="matkulNik"
                                                    class="text-white-50">-</span></span>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-light flex-fill" id="btnBatalMatkul">
                                        <i class="bi bi-x-lg me-1"></i>Batal
                                    </button>
                                    <button class="btn btn-primary flex-fill" id="btnKonfirmasiMatkul">
                                        <i class="bi bi-check-lg me-1"></i>Konfirmasi Absen
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Success State -->
                        <div id="successResult" class="d-none">
                            <div class="attendance-result attendance-result--success">
                                <div class="result-employee">
                                    <div class="result-avatar" id="resultAvatar">
                                        <i class="bi bi-person-fill"></i>
                                    </div>
                                    <div class="result-info">
                                        <h5 id="resultNama">-</h5>
                                        <div class="result-meta">
                                            <span><i class="bi bi-card-text me-1"></i><span
                                                    id="resultNik">-</span></span>
                                            <span><i class="bi bi-building me-1"></i><span
                                                    id="resultDept">-</span></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="result-details text-start">
                                    <div class="result-detail-item">
                                        <i class="bi bi-clock-fill text-primary"></i>
                                        <div>
                                            <small class="text-muted">Jam</small>
                                            <div id="resultJam" class="fw-bold">-</div>
                                        </div>
                                    </div>
                                    <div class="result-detail-item">
                                        <i class="bi bi-info-circle text-info"></i>
                                        <div>
                                            <small class="text-muted">Status</small>
                                            <div id="resultStatus" class="fw-bold">-</div>
                                        </div>
                                    </div>
                                </div>
                                <div class="result-message text-success fw-bold text-center mt-3" id="resultMessage">
                                </div>
                            </div>
                        </div>

                        <!-- Error State -->
                        <div id="errorResult" class="d-none">
                            <div class="attendance-result attendance-result--error">
                                <div class="error-icon">
                                    <i class="bi bi-x-circle-fill"></i>
                                </div>
                                <h5 id="errorTitle">Gagal</h5>
                                <p id="errorMessage" class="text-muted"></p>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div> <!-- Akhir Row Utama -->

        <div class="text-center mt-5">
            <a href="{{ url_for('auth.logout') }}" class="text-muted text-decoration-none small"><i
                    class="bi bi-box-arrow-right me-1"></i>Logout Terminal</a>
        </div>
    </div>
    <script>
        function keluarKeLogin() {
            window.location.href = "{{ url_for('auth.login') }}";
        } function keluarKeLogin() {
            // 1. Matikan kamera secara paksa
            const video = document.getElementById('videoFeed');
            if (video && video.srcObject) {
                const stream = video.srcObject;
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop()); // Memutus akses kamera
                video.srcObject = null;
            }

            // 2. Berhenti melakukan scanning (stop interval)
            if (typeof stopScanning === 'function') {
                stopScanning();
            }

            // 3. Pindah ke halaman login
            // Menggunakan window.location.href agar memaksa browser pindah
            window.location.href = "{{ url_for('auth.login') }}";
        }
    </script>
    <script>
        // Live Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveTime').textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);

        // Toast placeholder
        function showToast(msg) { console.log(msg); }
    </script>
    <script src="{{ url_for('static', filename='js/attendance.js') }}"></script>
    <script>
        // Auto-start camera in Kiosk mode
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = mediaStream;
                await video.play();
                document.getElementById('scanGraphic').style.display = 'block';
                startScanning();
            } catch (e) {
                document.getElementById('statusText').textContent = 'Error: Kamera tidak terdeteksi!';
                document.getElementById('statusText').style.color = '#ef4444';
            }
        });

        setTimeout(() => {
            if (document.querySelector('.page-actions')) {
                document.querySelector('.page-actions').remove();
            }
        }, 100);
    </script>
    <script>
        const matkulSelect = document.getElementById('matkulSelect');
        function captureAndScan() {
            const selectedMatkulId = matkulSelect.value;

            // Validasi sebelum proses scan ke backend dimulai
            if (!selectedMatkulId) {
                showFeedbackMessage("Pilih Mata Kuliah terlebih dahulu sebelum melakukan scan wajah!", "warning");
                return; // Hentikan proses scan jika dropdown kosong
            }

            // Ambil gambar dari video stream kamera
            const canvas = document.createElement('canvas');
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            canvas.getContext('2d').drawImage(videoElement, 0, 0);

            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('image', blob);
                formData.append('matkul_id', selectedMatkulId); // Sertakan mata kuliah yang dipilih

                fetch('/api/attendance/scan', {
                    method: 'POST',
                    body: formData
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            showFeedbackMessage(`Sukses! Absen tercatat atas nama ${data.student_name}`, "success");
                        } else {
                            showFeedbackMessage(data.message, "danger");
                        }
                    })
                    .catch(err => console.error("Error scanning:", err));
            }, 'image/jpeg');
        }
    </script>
</body>

</html>
